
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paleta de colores aleatoria en formatos hsl y hex.</title>
    <link rel="stylesheet" href="stylesheet" href="./css/styles.css">
</head>
<body>
    <main>
        <h1>Generador de paletas</h1>
        <div class="controles">
            <label for="select-cantidad">Cantidad de colores</label>
            <select id="select-cantidad">
                <option value="6">6 colores</option>
                <option value="8">8 colores</option>
                <option value="9">9 colores</option>
            </select>
            <button id="btn-generar">Generar Paleta</button>
        </div>

        <div id="paleta" role="lista">
            
        </div>

        <div id="toast" role="status"></div>
    </main>
    
    <script src="./js/script.js"></script>
</body>
</html>
